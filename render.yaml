services:
  - type: web
    name: quoteops-ai-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health/ready
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: quoteops-ai-postgres
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: LLM_ENABLED
        value: "false"
      - key: SEED_DEMO_ADMIN
        value: "false"
      - key: ENABLE_DEMO_TOOLS
        value: "false"

  - type: web
    name: quoteops-ai-frontend
    runtime: static
    buildCommand: cd frontend && corepack enable && pnpm install --frozen-lockfile && pnpm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: quoteops-ai-postgres
    plan: free
    databaseName: quoteops_ai
    user: quoteops_ai
