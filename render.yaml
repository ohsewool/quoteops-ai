services:
  - type: web
    name: quoteops-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: QUOTEOPS_ENV
        value: production
      - key: QUOTEOPS_DEMO_TOOLS_ENABLED
        value: "false"
      - key: QUOTEOPS_CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: QUOTEOPS_AUTH_SECRET
        sync: false
